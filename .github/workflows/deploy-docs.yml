name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-main
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "@tenderlane/*" build

      - name: Build docs
        run: cd docs-site && pnpm build

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs-site/dist
          branch: gh-pages
          clean: true
          # Keep per-PR previews so opening a PR doesn't get clobbered by a
          # main deploy and a main deploy doesn't wipe open-PR previews.
          clean-exclude: |
            pr-preview/**
